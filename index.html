<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>git page</title>
    <!-- 使用柔和的中性色和清爽的字体 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f8fafc;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #1e293b;
            padding: 2rem 1rem;
        }

        .resume-card {
            max-width: 1000px;
            margin: 0 auto;
            background-color: white;
            border-radius: 28px;
            box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.1), 0 4px 8px -2px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        .resume-card:hover {
            transform: translateY(-4px);
        }

        /* 头部区域 - 清爽的渐变 */
        .header {
            background: linear-gradient(135deg, #f1f5f9 0%, #e6edf5 100%);
            padding: 3rem 3rem 2rem 3rem;
            border-bottom: 1px solid rgba(203, 213, 225, 0.4);
        }

        .name-title h1 {
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: #0f172a;
            margin-bottom: 0.25rem;
        }

        .name-title .tagline {
            font-size: 1.3rem;
            font-weight: 400;
            color: #475569;
            margin-bottom: 1.5rem;
        }

        .contact-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem 2.5rem;
            margin-top: 1.2rem;
            font-size: 0.95rem;
            color: #334155;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .contact-item i { 
            width: 20px; 
            color: #64748b;
            font-style: normal;
            font-weight: 500;
        }

        /* 主体布局 - 两栏 34% / 66% */
        .main-content {
            display: flex;
            flex-wrap: wrap;
        }

        .sidebar {
            flex: 1 1 34%;
            background-color: #fcfdff;
            padding: 2.5rem 2rem 2.5rem 2.5rem;
            border-right: 1px solid #e9eef3;
        }

        .content {
            flex: 1 1 66%;
            padding: 2.5rem 2.5rem 2.5rem 2rem;
        }

        /* 通用模块样式 */
        .section {
            margin-bottom: 2.2rem;
        }

        .section-title {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 1.2rem;
            border-bottom: 1.5px solid #e2e8f0;
            padding-bottom: 0.5rem;
        }

        /* 技能标签 */
        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem 0.5rem;
        }

        .skill-tag {
            background-color: white;
            border: 1px solid #dce5ec;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e293b;
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .skill-tag:hover {
            background-color: #eef2f6;
            border-color: #a0b8cc;
        }

        /* 教育/经历条目 */
        .entry {
            margin-bottom: 1.6rem;
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.2rem;
        }

        .entry-title {
            font-weight: 650;
            font-size: 1.1rem;
            color: #0f172a;
        }

        .entry-subtitle {
            font-weight: 500;
            color: #3b4e66;
            font-size: 0.95rem;
        }

        .entry-date {
            font-size: 0.85rem;
            color: #62748c;
            background: #ecf1f6;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
        }

        .entry-desc {
            font-size: 0.95rem;
            color: #334155;
            margin-top: 0.3rem;
            padding-left: 0.2rem;
        }

        .entry-desc ul {
            list-style: none;
            margin-top: 0.4rem;
        }

        .entry-desc li {
            margin-bottom: 0.4rem;
            position: relative;
            padding-left: 1.2rem;
        }

        .entry-desc li::before {
            content: "•";
            color: #7b8ea6;
            font-weight: bold;
            position: absolute;
            left: 0;
        }

        /* 自我介绍/摘要 */
        .summary {
            background-color: #f1f6fb;
            padding: 1.3rem 1.6rem;
            border-radius: 18px;
            color: #1e2b3c;
            font-size: 0.98rem;
            margin-bottom: 2rem;
            border: 1px solid #dfe9f2;
        }

        hr {
            border: none;
            border-top: 1px dashed #d2dfeb;
            margin: 1.5rem 0;
        }

        /* 小头像占位 / 可选 */
        .profile-emoji {
            font-size: 3rem;
            background: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 1.2rem;
            border: 3px solid white;
        }

        /* 响应式 */
        @media (max-width: 700px) {
            .header { padding: 2rem 1.5rem; }
            .name-title h1 { font-size: 2.5rem; }
            .main-content { flex-direction: column; }
            .sidebar { 
                border-right: none; 
                border-bottom: 1px solid #e2e8f0;
                padding: 2rem 1.8rem;
            }
            .content { padding: 2rem 1.8rem; }
            .contact-bar { gap: 1rem; }
        }
    </style>
</head>
<body>
    <div class="resume-card">
        <!-- 头部：姓名 + 简介 -->
        <div class="header">
            <div class="profile-emoji">👤</div>
            <div class="name-title">
                <h1>李明</h1>
                <div class="tagline">产品设计师 · 创造简洁而优雅的体验</div>
            </div>

            <!-- 联系信息栏 (用纯文本模拟图标，也可以用字体图标，这里用最简单的方式) -->
            <div class="contact-bar">
                <span class="contact-item"><i>📧</i>123@email.me</span>
                <span class="contact-item"><i>📱</i> 123456 </span>
                <span class="contact-item"><i>📍</i> Hainan</span>
            </div>
        </div>

        <!-- 主体：两栏布局 -->
        <div class="main-content">
            <!-- 侧边栏：技能 / 语言 / 兴趣 -->
            <div class="sidebar">
                <!-- 技能 -->
                <div class="section">
                    <div class="section-title">专业技能</div>
                    <div class="skill-tags">
                       
                    </div>
                </div>


                <!-- 证书/奖项 简洁版 -->
                <div class="section">
                    <div class="section-title">荣誉 & 证书</div>
                   
                </div>

                <!-- 兴趣 / 其他 -->
                <div class="section">
                    <div class="section-title">日常灵感</div>
                    <div class="skill-tags" style="margin-top: 0.3rem;">
                        <span class="skill-tag">摄影</span>
                        <span class="skill-tag">城市徒步</span>

                    </div>
                </div>
            </div>

            <!-- 主内容：简介、工作经历、教育 -->
            <div class="content">
                <!-- 简短介绍 -->
                <div class="summary">
                  
                </div>

                <!-- 工作经历 -->
                <div class="section">
                    <div class="section-title">工作经历</div>
                    
                    <div class="entry">
                        <div class="entry-header">
                            <span class="entry-title"></span>
                            <span class="entry-date"></span>
                        </div>
                        <div class="entry-subtitle"></div>
                        <div class="entry-desc">
                            <ul>
                                
                            </ul>
                        </div>
                    </div>

                    <div class="entry">
                        <div class="entry-header">
                            <span class="entry-title">UI/UX 设计师</span>
                            <span class="entry-date">2018 – 2021</span>
                        </div>
                        <div class="entry-subtitle">智悦设计 · 杭州</div>
                        <div class="entry-desc">
                            <ul>
                                
                            </ul>
                        </div>
                    </div>
                </div>

                <!-- 教育背景 -->
                <div class="section">
                    <div class="section-title">教育背景</div>
                    <div class="entry">
                        <div class="entry-header">
                            <span class="entry-title"></span>
                            <span class="entry-date">2014 – 2018</span>
                        </div>
                        <div class="entry-subtitle"></div>
                        <div class="entry-desc">
                            
                        </div>
                    </div>
                </div>

                <!-- 额外小分隔线，可以放作品集链接等 -->
                <hr>
                <div style="text-align: right; font-size:0.9rem; color:#617b9b;">
                    🌟 更多作品集可访问 liming.design/portfolio
                </div>
            </div>
        </div>
    </div>

    <!-- 极简脚注，保留个人气息 -->
    <div style="max-width: 1000px; margin: 1rem auto 0; text-align: center; font-size: 0.8rem; color: #96a9bb;">
        ✦ 保持简洁 · 保持真实 ✦
    </div>
</body>
</html>
